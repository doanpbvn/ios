<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#06c1db">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>iOS Support - Đoàn</title>
  <link rel="icon" type="image/png" href="./image/appstore.png">
  <link rel="stylesheet" href="./main.css">
  <script src="./main.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body { background-color: #fff; }
    p { font-weight: bold;text-align: center; }
    .section { width: 100%; padding: 5px; background-color: #eee; margin: 10px 0; }
    .section input {width: 100%; border: 1px solid #ccc; margin: 10px 0; }
    .section button {width: 100%; height: 35px; background-color: #06c1db; color: white; }
    .data-row { max-height: 30px; display: flex; align-items: center; gap: 5px; margin: 10px; }
    .data-row input { background-color: #fff; padding: 5px; border-radius: 5px; color: #555; }
    .data-row button { width: 40%; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
    .copy-feedback { display: none; color: green; font-weight: bold; transition: opacity 0.3s ease; }
    select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 10px; text-align: center; }
    .icon-loading {  color: blue;}
    .icon-success { color: green; align-items: center; text-transform: uppercase; }
    .icon-error { color: red; }
    #reloadSheet { text-align: center; }
    input[type="radio"] {display: none;}
  </style>
</head>
<body>
  <h1 class="rainbow-animated">Anh Healer</h1>
  <div class="section">
    <h2>Chọn Trang Tính</h2>
    <select id="sheetSelect"></select>
    <div id="reloadSheet"></div>
    <p style="color: red;"> ĐANG TÉT 😊<br> Anh Healer không dùng tránh lỗi!</Header>!</p>
    <div class="data-row">
      <input type="radio" name="giftType" value="Mã 2FA Tiktok" checked>
      <input type="text" id="inputData" placeholder="Nhập mã 2FA muốn lưu">
      <button onclick="sendGiftToSheet('Sheet1')">Lưu Mã</button>
    </div>
    <input type="number" id="rowInput" placeholder="Nhập số hàng (VD: 2)" />
    <button onclick="displayData()">Lấy dữ liệu</button>
    <button id="updateButton" style="display: none;">ReloadData</button>
  </div>
  <div id="dataContainer"></div>
  <div id="qrcode"></div>

  <script>
    var qrText = "https://doanpbvn.github.io/ios/login.html";
    new QRCode(document.getElementById("qrcode"), qrText);
    const sheetSelect = document.getElementById("sheetSelect");
    sheetSelect.addEventListener("change", async () => {
    await loadSheetData(sheetSelect.value);
    });
    document.getElementById("updateButton").onclick = async () => {
        const sheetName = sheetSelect.value;
        const rowIndex = parseInt(document.getElementById("rowInput").value) - 2;
        const updatedData = [];
        headers.forEach((header, index) => {
            const value = document.getElementById(`accountData${index}`).value;
            updatedData.push(value);
        });
        await updateData(sheetName, rowIndex, updatedData);
    };
    const radios = document.querySelectorAll('.columns input[type="radio"]');
  radios.forEach(radio => {
    radio.addEventListener('change', () => {
      radios.forEach(r => r.parentElement.classList.remove('active'));
      radio.parentElement.classList.add('active');
    });
  });

  let isSubmitting = false;

  function sendGiftToSheet(sheetName) {
    if (isSubmitting) {
      alert("Đang gửi. Không bấm gửi lại !");
      return;
    }

    const inputData = document.getElementById("inputData").value.trim();
    const selectedType = document.querySelector('input[name="giftType"]:checked')?.value;
    if (!inputData) return alert("Vui lòng nhập link gift");
    if (!selectedType) return alert("Vui lòng chọn loại gift");

    isSubmitting = true;
    setTimeout(() => {
      isSubmitting = false;
    }, 5000);

    const params = new URLSearchParams({
      sheet: sheetName,
      type: selectedType,
      link: inputData
    });
    const fullURL = "https://script.google.com/macros/s/AKfycbxBduMz54Rd-3c1Pvz8k5AdEvXHF-JyVJF3dGKHeCfdYuor3SeS1du6teBmYBzcKPaPSQ/exec?" + params.toString();

    fetch(fullURL)
      .then(res => res.ok ? res.text() : Promise.reject('Fetch lỗi'))
      .then(data => {
        alert(`✅ Lưu Thành Công ${data}`);
        location.reload();
      })
      .catch(err => {
        console.error(err);
        alert("❌ Có lỗi xảy ra, vui lòng thử lại!");
      });
  }
</script>
</body>
</html>
